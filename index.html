<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links - CV. Cendekia Ganesha Indonesia</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;600;700;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: #0B1B3D; /* BOLD SAPPHIRE */
            color: #FFFFFF;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .links-container {
            width: 100%;
            max-width: 480px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .profile-header {
            margin-bottom: 40px;
        }

        .profile-logo {
            width: 90px;
            height: 90px;
            background-color: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.5rem;
            margin: 0 auto 20px auto;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        .company-name {
            font-size: 1.4rem;
            font-weight: 800;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        .tagline {
            font-size: 0.95rem;
            line-height: 1.6;
            color: #D1D5DB;
            padding: 0 10px;
        }

        .links-wrapper {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 50px;
        }

        .link-btn {
            display: flex;
            align-items: center;
            width: 100%;
            padding: 16px 24px;
            text-decoration: none;
            border-radius: 16px;
            font-weight: 700;
            font-size: 0.95rem;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .btn-icon {
            font-size: 1.3rem;
            margin-right: 15px;
        }

        .btn-text {
            text-align: left;
        }

        .primary-btn {
            background-color: #FB8B24; /* Coral */
            color: #FFFFFF;
            box-shadow: 0 6px 20px rgba(251, 139, 36, 0.25);
        }

        .primary-btn:hover {
            background-color: #E07A1B;
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(251, 139, 36, 0.4);
        }

        .secondary-btn {
            background-color: #132247;
            color: #FFFFFF;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .secondary-btn:hover {
            background-color: #1a2d5c;
            border-color: #FB8B24;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .links-footer p {
            font-size: 0.8rem;
            color: #6B7280;
            line-height: 1.5;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div class="links-container">
        <div class="profile-header">
            <div class="profile-logo">🎓</div>
            <h1 class="company-name">CV. Cendekia Ganesha Indonesia</h1>
            <p class="tagline">Mari raih cita-cita sesuai kemampuan sang buah hati dengan deteksi sejak dini melalui Cendekia Indonesia.</p>
        </div>

        <div class="links-wrapper">
            <!-- Tombol 1: WhatsApp -->
            <a href="https://wa.me/6281392761879?text=Halo%20Admin%20Cendekia%20Ganesha" class="link-btn primary-btn" target="_blank">
                <span class="btn-icon">💬</span>
                <span class="btn-text">Konsultasi & Jadwal Tes (WhatsApp)</span>
            </a>

            <!-- Tombol 2: Katalog -->
            <a href="#" class="link-btn secondary-btn">
                <span class="btn-icon">📊</span>
                <span class="btn-text">Brosur Digital & Daftar Harga</span>
            </a>

            <!-- Tombol 3: Website -->
            <a href="#" class="link-btn secondary-btn">
                <span class="btn-icon">🌐</span>
                <span class="btn-text">Kunjungi Website Resmi</span>
            </a>
        </div>

        <div class="links-footer">
            <p>© 2026 CV. Cendekia Ganesha Indonesia. <br>All rights reserved.</p>
        </div>
    </div>

</body>
</html>
